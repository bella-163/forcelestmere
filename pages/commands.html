  <script src="../assets/js/main.js"></script>
  <script>
  (async () => {
    const commands = await fetch('/api/data/commands').then(r => r.json());
    document.getElementById('commands-grid').innerHTML = commands.map(c => `
      <article class="content-card">
        <h3 style="font-family:monospace;">${c.command}</h3>
        <p>${c.description}</p>
        <div class="meta-list">
          <span>分類 <strong>${c.category}</strong></span>
          <span>冷卻 <strong>${c.cooldown}</strong></span>
        </div>
      </article>`).join('');
  })();
  </script>
