<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>怪物介紹｜文靜之潭</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html"><span class="brand__mark">✦</span><span><strong>文靜之潭</strong><small>Minecraft RPG Server</small></span></a>
    <button class="nav-toggle" type="button" aria-label="開啟選單">☰</button>
    <nav class="site-nav" aria-label="主要導覽">
      <a href="../index.html">首頁</a><a href="classes.html">職業介紹</a><a href="equipment.html">裝備介紹</a><a href="https://gikkt-celestmere-rpg-equipment.netlify.app/" target="_blank" rel="noopener noreferrer">裝備圖鑑</a><a class="active" href="monsters.html">怪物介紹</a><a href="commands.html">功能及指令</a><a href="guide.html">新手攻略</a><a href="news.html">最新公告</a>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <div class="container">
        <p class="eyebrow">Monsters</p>
        <h1>怪物介紹</h1>
        <p>整理各區怪物等級、危險度、弱點與掉落物。打怪前先看資料，別讓怪物幫你寫墓誌銘。</p>
      </div>
    </section>

    <section class="container section">
      <div class="content-grid" id="monsters-grid"></div>
    </section>
  </main>

  <footer class="site-footer"><p class="copyright">© 2025 文靜之潭 Minecraft RPG Server.</p></footer>
  <script src="../assets/js/main.js"></script>
  <script>
  (async () => {
    const monsters = await fetch('/api/data/monsters').then(r => r.json());
    document.getElementById('monsters-grid').innerHTML = monsters.map(m => `
      <article class="content-card">
        <h3>${m.name}</h3>
        <p>${m.description || ''}</p>
        <div class="meta-list">
          <span>等級 <strong>${m.level}</strong></span>
          <span>弱點 <strong>${m.weakness}</strong></span>
          <span>掉落 <strong>${(m.drops || []).join('、')}</strong></span>
        </div>
      </article>`).join('');
  })();
  </script>
</body>
</html>
