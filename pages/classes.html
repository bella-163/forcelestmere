<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>職業介紹｜文靜之潭</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html"><span class="brand__mark">✦</span><span><strong>文靜之潭</strong><small>Minecraft RPG Server</small></span></a>
    <button class="nav-toggle" type="button" aria-label="開啟選單">☰</button>
    <nav class="site-nav" aria-label="主要導覽">
      <a href="../index.html">首頁</a><a class="active" href="classes.html">職業介紹</a><a href="equipment.html">裝備介紹</a><a href="https://gikkt-celestmere-rpg-equipment.netlify.app/" target="_blank" rel="noopener noreferrer">裝備圖鑑</a><a href="monsters.html">怪物介紹</a><a href="commands.html">功能及指令</a><a href="guide.html">新手攻略</a><a href="news.html">最新公告</a>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <div class="container">
        <p class="eyebrow">Classes</p>
        <h1>職業介紹</h1>
        <p>選擇你的定位：坦克、爆發、遠程、治療或召喚。隊伍不是湊人頭，是湊傳奇。</p>
      </div>
    </section>

    <section class="container section">
      <div class="content-grid" id="classes-grid"></div>
    </section>
  </main>

  <footer class="site-footer"><p class="copyright">© 2025 文靜之潭 Minecraft RPG Server.</p></footer>
  <script src="../assets/js/main.js"></script>
  <script>
  (async () => {
    const classes = await fetch('/api/data/classes').then(r => r.json());
    document.getElementById('classes-grid').innerHTML = classes.map(c => `
      <article class="content-card">
        <h3>${c.name}</h3>
        <p>${c.description || ''}</p>
        <ul>
          <li>定位：${c.role}</li>
          <li>難度：${c.difficulty}</li>
          <li>特色：${(c.features || []).join('、')}</li>
        </ul>
      </article>`).join('');
  })();
  </script>
</body>
</html>
