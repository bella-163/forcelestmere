<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>裝備介紹｜文靜之潭</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html"><span class="brand__mark">✦</span><span><strong>文靜之潭</strong><small>Minecraft RPG Server</small></span></a>
    <button class="nav-toggle" type="button" aria-label="開啟選單">☰</button>
    <nav class="site-nav" aria-label="主要導覽">
      <a href="../index.html">首頁</a><a href="classes.html">職業介紹</a><a class="active" href="equipment.html">裝備介紹</a><a href="https://gikkt-celestmere-rpg-equipment.netlify.app/" target="_blank" rel="noopener noreferrer">裝備圖鑑</a><a href="monsters.html">怪物介紹</a><a href="commands.html">功能及指令</a><a href="guide.html">新手攻略</a><a href="news.html">最新公告</a>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <div class="container">
        <p class="eyebrow">Equipment</p>
        <h1>裝備介紹</h1>
        <p>武器、防具、飾品與套裝效果整理。裝備不是越閃越強，但通常越閃越帥。</p>
      </div>
    </section>

    <section class="container section">
      <div class="content-grid" id="equipment-grid"></div>
    </section>
  </main>

  <footer class="site-footer"><p class="copyright">© 2025 文靜之潭 Minecraft RPG Server.</p></footer>
  <script src="../assets/js/main.js"></script>
  <script>
  (async () => {
    const items = await fetch('/api/data/equipment').then(r => r.json());
    document.getElementById('equipment-grid').innerHTML = items.map(e => `
      <article class="content-card">
        <h3>${e.name}</h3>
        <p>${e.description || ''}</p>
        <div class="meta-list">
          <span>稀有度 <strong>${e.rarity}</strong></span>
          <span>類型 <strong>${e.type}</strong></span>
          <span>取得方式 <strong>${e.source}</strong></span>
          <span>效果 <strong>${e.effect}</strong></span>
        </div>
      </article>`).join('');
  })();
  </script>
</body>
</html>
