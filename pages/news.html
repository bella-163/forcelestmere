<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>最新公告｜文靜之潭</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html"><span class="brand__mark">✦</span><span><strong>文靜之潭</strong><small>Minecraft RPG Server</small></span></a>
    <button class="nav-toggle" type="button" aria-label="開啟選單">☰</button>
    <nav class="site-nav" aria-label="主要導覽">
      <a href="../index.html">首頁</a><a href="classes.html">職業介紹</a><a href="equipment.html">裝備介紹</a><a href="https://gikkt-celestmere-rpg-equipment.netlify.app/" target="_blank" rel="noopener noreferrer">裝備圖鑑</a><a href="monsters.html">怪物介紹</a><a href="commands.html">功能及指令</a><a href="guide.html">新手攻略</a><a class="active" href="news.html">最新公告</a>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <div class="container">
        <p class="eyebrow">News</p>
        <h1>最新公告</h1>
        <p>版本更新、活動開跑、維護資訊與重要規則都集中在這裡。</p>
      </div>
    </section>

    <section class="container section">
      <div class="panel">
        <div class="news-list" id="news-list"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer"><p class="copyright">© 2025 文靜之潭 Minecraft RPG Server.</p></footer>
  <script src="../assets/js/main.js"></script>
  <script>
  (async () => {
    const TAG = { important: 'tag--important', event: 'tag--event', update: 'tag--update', general: '' };
    const news = await fetch('/api/data/news').then(r => r.json());
    document.getElementById('news-list').innerHTML = news.map(n => `
      <article class="news-item">
        <span class="tag ${TAG[n.tagType] || ''}">${n.tag}</span>
        <div><h3>${n.title}</h3><p>${n.content}</p></div>
        <time datetime="${n.date}">${n.date}</time>
      </article>`).join('');
  })();
  </script>
</body>
</html>
