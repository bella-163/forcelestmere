<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理後台｜文靜之潭</title>
  <style>
    :root {
      --bg: #0e1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --cyan: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --gold: #d29922;
      --input-bg: #0d1117;
      --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; font-size: 14px; min-height: 100vh; }

    .layout { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }

    /* Sidebar */
    .sidebar { background: var(--panel); border-right: 1px solid var(--border); padding: 24px 0; display: flex; flex-direction: column; gap: 4px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
    .sidebar-logo { padding: 0 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
    .sidebar-logo strong { display: block; font-size: 1rem; color: var(--cyan); }
    .sidebar-logo span { color: var(--muted); font-size: 0.78rem; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; cursor: pointer; border-radius: 0; color: var(--muted); transition: background 0.15s, color 0.15s; border: none; background: none; width: 100%; text-align: left; font-size: 14px; }
    .nav-item:hover { background: rgba(88,166,255,0.08); color: var(--text); }
    .nav-item.active { background: rgba(88,166,255,0.15); color: var(--cyan); }
    .nav-item .icon { width: 18px; text-align: center; }
    .sidebar-footer { margin-top: auto; padding: 16px 20px; border-top: 1px solid var(--border); }
    .sidebar-footer a { color: var(--muted); text-decoration: none; font-size: 0.82rem; }
    .sidebar-footer a:hover { color: var(--cyan); }

    /* Main */
    .main { padding: 32px; overflow-y: auto; }
    .page-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
    .page-desc { color: var(--muted); margin-bottom: 28px; }

    /* Toast */
    .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: var(--radius); font-weight: 600; font-size: 0.9rem; z-index: 999; transition: opacity 0.3s; pointer-events: none; }
    .toast.success { background: #1a3a1a; color: var(--green); border: 1px solid var(--green); }
    .toast.error { background: #3a1a1a; color: var(--red); border: 1px solid var(--red); }
    .toast.hidden { opacity: 0; }

    /* Cards / Sections */
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .card-title { font-weight: 700; font-size: 1rem; }

    /* Form elements */
    label { display: block; color: var(--muted); font-size: 0.82rem; margin-bottom: 6px; margin-top: 14px; }
    label:first-child { margin-top: 0; }
    input, textarea, select {
      width: 100%; padding: 8px 12px; border-radius: var(--radius); border: 1px solid var(--border);
      background: var(--input-bg); color: var(--text); font-size: 14px; font-family: inherit;
      outline: none; transition: border-color 0.15s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--cyan); }
    textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius); border: 1px solid var(--border); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; background: none; color: var(--text); }
    .btn:hover { background: rgba(255,255,255,0.06); }
    .btn-primary { background: var(--cyan); color: #0d1117; border-color: var(--cyan); }
    .btn-primary:hover { opacity: 0.85; background: var(--cyan); }
    .btn-danger { color: var(--red); border-color: transparent; }
    .btn-danger:hover { background: rgba(248,81,73,0.12); border-color: var(--red); }
    .btn-success { background: var(--green); color: #0d1117; border-color: var(--green); }
    .btn-success:hover { opacity: 0.85; background: var(--green); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    /* List items */
    .item-list { display: grid; gap: 10px; }
    .item-row { display: flex; align-items: flex-start; gap: 12px; padding: 14px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--input-bg); }
    .item-row-body { flex: 1; min-width: 0; }
    .item-row-title { font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-row-meta { color: var(--muted); font-size: 0.82rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-row-actions { display: flex; gap: 4px; flex-shrink: 0; }

    /* Modal */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: none; align-items: center; justify-content: center; }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 28px; width: min(600px, calc(100vw - 40px)); max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .modal-title { font-size: 1.1rem; font-weight: 700; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); }

    /* Tag badge */
    .tag { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.75rem; font-weight: 700; }
    .tag-important { background: rgba(248,81,73,0.2); color: #f85149; }
    .tag-event { background: rgba(63,185,80,0.18); color: #3fb950; }
    .tag-update { background: rgba(88,166,255,0.2); color: #58a6ff; }
    .tag-general { background: rgba(139,148,158,0.2); color: #8b949e; }

    /* Image upload */
    .img-upload-area { border: 2px dashed var(--border); border-radius: var(--radius); padding: 24px; text-align: center; cursor: pointer; transition: border-color 0.15s; }
    .img-upload-area:hover { border-color: var(--cyan); }
    .img-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: var(--radius); margin-top: 10px; display: none; }

    .section-hidden { display: none; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  </style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <strong>✦ 文靜之潭</strong>
      <span>管理後台</span>
    </div>
    <button class="nav-item active" data-section="server-info"><span class="icon">🖥</span> 伺服器資訊</button>
    <button class="nav-item" data-section="news"><span class="icon">📢</span> 最新公告</button>
    <button class="nav-item" data-section="classes"><span class="icon">⚔</span> 職業介紹</button>
    <button class="nav-item" data-section="equipment"><span class="icon">◆</span> 裝備介紹</button>
    <button class="nav-item" data-section="monsters"><span class="icon">☠</span> 怪物介紹</button>
    <button class="nav-item" data-section="commands"><span class="icon">⌘</span> 指令列表</button>
    <div class="sidebar-footer">
      <a href="/" target="_blank">↗ 開啟展示版</a>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main">

    <!-- Server Info -->
    <div id="section-server-info">
      <div class="page-title">伺服器資訊</div>
      <div class="page-desc">首頁顯示的伺服器基本資訊與 Hero 文字。</div>
      <div class="card">
        <div class="card-title" style="margin-bottom:16px;">連線資訊</div>
        <div class="form-row">
          <div><label>伺服器 IP</label><input id="si-ip" type="text" /></div>
          <div><label>版本</label><input id="si-version" type="text" /></div>
        </div>
        <div class="form-row" style="margin-top:14px;">
          <div><label>狀態</label><input id="si-status" type="text" /></div>
          <div><label>Discord 連結</label><input id="si-discord" type="text" /></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title" style="margin-bottom:16px;">首頁 Hero 文字</div>
        <label>小標（eyebrow）</label><input id="si-eyebrow" type="text" />
        <label>大標題</label><input id="si-title" type="text" />
        <label>說明文字</label><textarea id="si-lead" rows="5"></textarea>
      </div>
      <button class="btn btn-primary" onclick="saveServerInfo()">💾 儲存</button>
    </div>

    <!-- News -->
    <div id="section-news" class="section-hidden">
      <div class="page-title">最新公告</div>
      <div class="page-desc">管理首頁與公告頁的公告列表。</div>
      <div style="margin-bottom:16px;"><button class="btn btn-primary" onclick="openNewsModal()">＋ 新增公告</button></div>
      <div class="item-list" id="news-list"></div>
    </div>

    <!-- Classes -->
    <div id="section-classes" class="section-hidden">
      <div class="page-title">職業介紹</div>
      <div class="page-desc">管理職業列表內容。</div>
      <div style="margin-bottom:16px;"><button class="btn btn-primary" onclick="openClassModal()">＋ 新增職業</button></div>
      <div class="item-list" id="classes-list"></div>
    </div>

    <!-- Equipment -->
    <div id="section-equipment" class="section-hidden">
      <div class="page-title">裝備介紹</div>
      <div class="page-desc">管理裝備列表內容。</div>
      <div style="margin-bottom:16px;"><button class="btn btn-primary" onclick="openEquipModal()">＋ 新增裝備</button></div>
      <div class="item-list" id="equipment-list"></div>
    </div>

    <!-- Monsters -->
    <div id="section-monsters" class="section-hidden">
      <div class="page-title">怪物介紹</div>
      <div class="page-desc">管理怪物列表內容。</div>
      <div style="margin-bottom:16px;"><button class="btn btn-primary" onclick="openMonsterModal()">＋ 新增怪物</button></div>
      <div class="item-list" id="monsters-list"></div>
    </div>

    <!-- Commands -->
    <div id="section-commands" class="section-hidden">
      <div class="page-title">指令列表</div>
      <div class="page-desc">管理功能及指令頁的指令列表。</div>
      <div style="margin-bottom:16px;"><button class="btn btn-primary" onclick="openCmdModal()">＋ 新增指令</button></div>
      <div class="item-list" id="commands-list"></div>
    </div>

  </main>
</div>

<!-- Toast -->
<div class="toast hidden" id="toast"></div>

<!-- News Modal -->
<div class="modal-backdrop" id="news-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="news-modal-title">新增公告</div>
      <button class="btn btn-sm" onclick="closeModal('news-modal')">✕</button>
    </div>
    <input type="hidden" id="news-idx" value="-1" />
    <label>標籤文字</label><input id="n-tag" type="text" placeholder="重要 / 活動 / 更新 / 公告" />
    <label>標籤類型</label>
    <select id="n-tagType">
      <option value="important">important（紅）</option>
      <option value="event">event（綠）</option>
      <option value="update">update（藍）</option>
      <option value="general">general（灰）</option>
    </select>
    <label>標題</label><input id="n-title" type="text" />
    <label>內容</label><textarea id="n-content"></textarea>
    <label>日期</label><input id="n-date" type="date" />
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('news-modal')">取消</button>
      <button class="btn btn-primary" onclick="saveNewsItem()">儲存</button>
    </div>
  </div>
</div>

<!-- Class Modal -->
<div class="modal-backdrop" id="class-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="class-modal-title">新增職業</div>
      <button class="btn btn-sm" onclick="closeModal('class-modal')">✕</button>
    </div>
    <input type="hidden" id="class-idx" value="-1" />
    <div class="form-row">
      <div><label>職業名稱</label><input id="c-name" type="text" /></div>
      <div><label>定位</label><input id="c-role" type="text" placeholder="近戰・坦克" /></div>
    </div>
    <label>難度</label><input id="c-difficulty" type="text" placeholder="新手友善 / 中等 / 進階" />
    <label>特色（用逗號分隔）</label><input id="c-features" type="text" placeholder="高生命值, 格擋減傷, 穩定控場" />
    <label>簡介</label><textarea id="c-desc"></textarea>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('class-modal')">取消</button>
      <button class="btn btn-primary" onclick="saveClassItem()">儲存</button>
    </div>
  </div>
</div>

<!-- Equipment Modal -->
<div class="modal-backdrop" id="equip-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="equip-modal-title">新增裝備</div>
      <button class="btn btn-sm" onclick="closeModal('equip-modal')">✕</button>
    </div>
    <input type="hidden" id="eq-idx" value="-1" />
    <div class="form-row">
      <div><label>裝備名稱</label><input id="eq-name" type="text" /></div>
      <div><label>類型</label><input id="eq-type" type="text" placeholder="武器 / 防具 / 副手 / 飾品" /></div>
    </div>
    <div class="form-row">
      <div><label>稀有度</label><input id="eq-rarity" type="text" placeholder="傳說 / 史詩 / 稀有" /></div>
      <div><label>取得方式</label><input id="eq-source" type="text" /></div>
    </div>
    <label>效果</label><input id="eq-effect" type="text" />
    <label>簡介</label><textarea id="eq-desc"></textarea>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('equip-modal')">取消</button>
      <button class="btn btn-primary" onclick="saveEquipItem()">儲存</button>
    </div>
  </div>
</div>

<!-- Monster Modal -->
<div class="modal-backdrop" id="monster-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="monster-modal-title">新增怪物</div>
      <button class="btn btn-sm" onclick="closeModal('monster-modal')">✕</button>
    </div>
    <input type="hidden" id="mo-idx" value="-1" />
    <div class="form-row">
      <div><label>怪物名稱</label><input id="mo-name" type="text" /></div>
      <div><label>等級</label><input id="mo-level" type="text" placeholder="Lv.1 - 10" /></div>
    </div>
    <div class="form-row">
      <div><label>弱點</label><input id="mo-weakness" type="text" /></div>
      <div><label>掉落物（逗號分隔）</label><input id="mo-drops" type="text" /></div>
    </div>
    <label>簡介</label><textarea id="mo-desc"></textarea>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('monster-modal')">取消</button>
      <button class="btn btn-primary" onclick="saveMonsterItem()">儲存</button>
    </div>
  </div>
</div>

<!-- Command Modal -->
<div class="modal-backdrop" id="cmd-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="cmd-modal-title">新增指令</div>
      <button class="btn btn-sm" onclick="closeModal('cmd-modal')">✕</button>
    </div>
    <input type="hidden" id="cmd-idx" value="-1" />
    <div class="form-row">
      <div><label>指令</label><input id="cmd-command" type="text" placeholder="/spawn" /></div>
      <div><label>分類</label><input id="cmd-category" type="text" placeholder="傳送 / 玩家互動 / 經濟系統" /></div>
    </div>
    <label>說明</label><textarea id="cmd-desc" rows="2"></textarea>
    <label>冷卻時間</label><input id="cmd-cooldown" type="text" placeholder="5 秒 / 無 / 每日重置" />
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('cmd-modal')">取消</button>
      <button class="btn btn-primary" onclick="saveCmdItem()">儲存</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────
const state = { news: [], classes: [], equipment: [], monsters: [], commands: [], 'server-info': {} };

// ── Navigation ──────────────────────────────────────────
document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('[id^="section-"]').forEach(s => s.classList.add('section-hidden'));
    document.getElementById('section-' + btn.dataset.section).classList.remove('section-hidden');
  });
});

// ── API helpers ────────────────────────────────────────
async function load(name) {
  const r = await fetch(`/api/data/${name}`);
  return r.json();
}
async function save(name, data) {
  await fetch(`/api/data/${name}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
}

// ── Toast ───────────────────────────────────────────────
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type}`;
  setTimeout(() => el.classList.add('hidden'), 2500);
}

// ── Modal ───────────────────────────────────────────────
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openModal(id) { document.getElementById(id).classList.add('open'); }
document.querySelectorAll('.modal-backdrop').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

// ── Server Info ────────────────────────────────────────
async function loadServerInfo() {
  const d = await load('server-info');
  state['server-info'] = d;
  document.getElementById('si-ip').value = d.ip || '';
  document.getElementById('si-version').value = d.version || '';
  document.getElementById('si-status').value = d.status || '';
  document.getElementById('si-discord').value = d.discordUrl || '';
  document.getElementById('si-eyebrow').value = d.heroEyebrow || '';
  document.getElementById('si-title').value = d.heroTitle || '';
  document.getElementById('si-lead').value = d.heroLead || '';
}
async function saveServerInfo() {
  const d = {
    ip: document.getElementById('si-ip').value,
    version: document.getElementById('si-version').value,
    status: document.getElementById('si-status').value,
    discordUrl: document.getElementById('si-discord').value,
    heroEyebrow: document.getElementById('si-eyebrow').value,
    heroTitle: document.getElementById('si-title').value,
    heroLead: document.getElementById('si-lead').value,
  };
  await save('server-info', d);
  toast('伺服器資訊已儲存 ✓');
}

// ── News ───────────────────────────────────────────────
const TAG_CLASS = { important: 'tag-important', event: 'tag-event', update: 'tag-update', general: 'tag-general' };
async function loadNews() {
  state.news = await load('news');
  renderNews();
}
function renderNews() {
  const list = document.getElementById('news-list');
  list.innerHTML = state.news.map((n, i) => `
    <div class="item-row">
      <div class="item-row-body">
        <div class="item-row-title"><span class="tag ${TAG_CLASS[n.tagType] || 'tag-general'}">${n.tag}</span> ${n.title}</div>
        <div class="item-row-meta">${n.date} · ${n.content}</div>
      </div>
      <div class="item-row-actions">
        <button class="btn btn-sm" onclick="editNews(${i})">編輯</button>
        <button class="btn btn-sm btn-danger" onclick="deleteNews(${i})">刪除</button>
      </div>
    </div>`).join('');
}
function openNewsModal(idx = -1) {
  document.getElementById('news-modal-title').textContent = idx < 0 ? '新增公告' : '編輯公告';
  document.getElementById('news-idx').value = idx;
  const n = idx >= 0 ? state.news[idx] : {};
  document.getElementById('n-tag').value = n.tag || '';
  document.getElementById('n-tagType').value = n.tagType || 'general';
  document.getElementById('n-title').value = n.title || '';
  document.getElementById('n-content').value = n.content || '';
  document.getElementById('n-date').value = n.date || new Date().toISOString().slice(0, 10);
  openModal('news-modal');
}
function editNews(i) { openNewsModal(i); }
async function deleteNews(i) {
  if (!confirm('確定刪除？')) return;
  state.news.splice(i, 1);
  await save('news', state.news);
  renderNews();
  toast('已刪除');
}
async function saveNewsItem() {
  const idx = parseInt(document.getElementById('news-idx').value);
  const item = {
    tag: document.getElementById('n-tag').value,
    tagType: document.getElementById('n-tagType').value,
    title: document.getElementById('n-title').value,
    content: document.getElementById('n-content').value,
    date: document.getElementById('n-date').value,
  };
  if (idx < 0) state.news.unshift(item);
  else state.news[idx] = item;
  await save('news', state.news);
  renderNews();
  closeModal('news-modal');
  toast('公告已儲存 ✓');
}

// ── Classes ─────────────────────────────────────────────
async function loadClasses() {
  state.classes = await load('classes');
  renderClasses();
}
function renderClasses() {
  document.getElementById('classes-list').innerHTML = state.classes.map((c, i) => `
    <div class="item-row">
      <div class="item-row-body">
        <div class="item-row-title">${c.name}</div>
        <div class="item-row-meta">${c.role} · ${c.difficulty} · ${(c.features||[]).join(', ')}</div>
      </div>
      <div class="item-row-actions">
        <button class="btn btn-sm" onclick="editClass(${i})">編輯</button>
        <button class="btn btn-sm btn-danger" onclick="deleteClass(${i})">刪除</button>
      </div>
    </div>`).join('');
}
function openClassModal(idx = -1) {
  document.getElementById('class-modal-title').textContent = idx < 0 ? '新增職業' : '編輯職業';
  document.getElementById('class-idx').value = idx;
  const c = idx >= 0 ? state.classes[idx] : {};
