    <path d="M0 560 190 430 380 520 560 390 790 560 960 420 1135 565 1330 455 1600 600 1600 900 0 900z" opacity="0.68"/>
  </g>

  <g opacity="0.85">
    <rect x="120" y="380" width="110" height="240" fill="#14314a"/>
    <rect x="250" y="430" width="80" height="190" fill="#10283e"/>
    <rect x="1300" y="360" width="110" height="260" fill="#14314a"/>
    <rect x="1430" y="420" width="86" height="210" fill="#10283e"/>
    <rect x="158" y="340" width="34" height="40" fill="#1e4a66"/>
    <rect x="1338" y="320" width="34" height="40" fill="#1e4a66"/>
  </g>

  <g fill="#67e8f9" opacity="0.42" filter="url(#blur)">
