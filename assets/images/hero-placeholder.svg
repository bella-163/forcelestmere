<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">文靜之潭奇幻水域背景</title>
  <desc id="desc">藍綠色水域、遺跡、瀑布與像素感光點組成的網站背景。</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#07182d"/>
      <stop offset="0.52" stop-color="#0d3450"/>
      <stop offset="1" stop-color="#03101b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="48%" r="38%">
      <stop offset="0" stop-color="#67e8f9" stop-opacity="0.72"/>
      <stop offset="0.42" stop-color="#0ea5e9" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="16"/></filter>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <g opacity="0.45">
    <circle cx="800" cy="240" r="150" fill="none" stroke="#b8f7ff" stroke-width="3"/>
    <circle cx="800" cy="240" r="94" fill="none" stroke="#67e8f9" stroke-width="2"/>
    <path d="M800 68 831 205 970 240 831 275 800 412 769 275 630 240 769 205z" fill="none" stroke="#b8f7ff" stroke-width="3"/>
  </g>

  <g fill="#0b2234">
